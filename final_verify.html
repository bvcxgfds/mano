
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Printer Verification - Pi 3.5"</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { cursor: none !important; box-sizing: border-box; }

  :root {
    --bg:        #0f172a;
    --surface:   #0f172a;
    --card:      #1e293b;
    --border:    #334155;
    --accent:    #ffffff;
    --accent2:   #2563eb;
    --danger:    #ef4444;
    --warn:      #f59e0b;
    --text:      #ffffff;
    --muted:     #94a3b8;
    --ok:        #22c55e;
  }

  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    cursor: none;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-rows: auto auto 1fr auto auto auto;
    width: 100vw;
    height: 100vh;
    padding: 10px 12px;
    gap: 8px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    position: relative;
  }

  .header-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #22c55e;
    background: rgba(34,197,94,0.12);
    border: 1.5px solid #22c55e;
    padding: 4px 12px;
    border-radius: 6px;
    letter-spacing: 2px;
    position: absolute;
    right: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  h2 {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text);
  }

  .inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  label {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  input {
    width: 100%;
    padding: 10px 12px;
    font-size: 30px;
    font-family: 'Share Tech Mono', monospace;
    font-weight: 400;
    letter-spacing: 4px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    text-align: center;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    caret-color: var(--text);
  }

  input:focus,
  input.active {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
  }

  input::placeholder {
    color: var(--muted);
    font-size: 18px;
    letter-spacing: 2px;
  }

  input.locked {
    opacity: 0.45;
    border-color: var(--border) !important;
    box-shadow: none !important;
  }

  .keypad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 6px;
    width: 100%;
    height: 100%;
  }

  .keypad button {
    width: 100%;
    height: 100%;
    font-size: 30px;
    font-weight: 700;
    font-family: 'Barlow', sans-serif;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    transition: background 0.08s, transform 0.07s, box-shadow 0.08s, opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .keypad button::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    border-radius: inherit;
    transition: background 0.15s;
  }

  .keypad button:active::after { background: rgba(255,255,255,0.06); }
  .keypad button:active { transform: scale(0.94); }

  .keypad button:not(.clear):not(.backspace):hover {
    background: #3d5068;
    border-color: var(--border);
  }

  .keypad .backspace {
    background: var(--warn);
    border-color: var(--warn);
    color: white;
    font-size: 26px;
  }
  .keypad .backspace:active { background: #d97706; }

  .keypad .clear {
    background: var(--danger);
    border-color: var(--danger);
    color: white;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
  }
  .keypad .clear:active { background: #dc2626; }

  .keypad button.locked,
  .verify-btn.locked {
    opacity: 0.35;
    pointer-events: none;
  }

  .verify-btn {
    width: 100%;
    padding: 0;
    height: 58px;
    font-size: 22px;
    font-weight: 800;
    font-family: 'Barlow', sans-serif;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--accent2);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    transition: opacity 0.1s, transform 0.08s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .verify-btn:active {
    opacity: 0.88;
    transform: scale(0.98);
  }

  #result {
    font-family: 'Share Tech Mono', monospace;
    font-size: 17px;
    text-align: center;
    height: 24px;
    letter-spacing: 0.5px;
    transition: color 0.2s;
    margin: 0;
  }

  #progressBarWrap {
    width: 100%;
    height: 6px;
    background: #1e293b;
    border-radius: 999px;
    overflow: hidden;
    display: none;
  }

  #progressBar {
    height: 100%;
    width: 0%;
    background: #22c55e;
    border-radius: 999px;
    transition: width 0.2s ease;
  }
</style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <h2>Printer Verification</h2>
    <span class="header-badge">SECURE</span>
  </div>

  <div class="inputs">
    <div class="field">
      <label>Print ID</label>
      <input id="printId" placeholder="––––––" maxlength="6" readonly />
    </div>
    <div class="field">
      <label>OTP</label>
      <input id="otp" placeholder="––––" maxlength="4" readonly />
    </div>
  </div>

  <div class="keypad" id="keypad">
    <button onclick="addNumber(1)">1</button>
    <button onclick="addNumber(2)">2</button>
    <button onclick="addNumber(3)">3</button>
    <button class="backspace" onclick="backspace()">⌫</button>

    <button onclick="addNumber(4)">4</button>
    <button onclick="addNumber(5)">5</button>
    <button onclick="addNumber(6)">6</button>
    <button class="clear" onclick="clearInput()">CLR</button>

    <button onclick="addNumber(7)">7</button>
    <button onclick="addNumber(8)">8</button>
    <button onclick="addNumber(9)">9</button>
    <button onclick="addNumber(0)">0</button>
  </div>

  <button class="verify-btn" id="verifyBtn" onclick="verify()">
    Verify
  </button>

  <p id="result"></p>

  <div id="progressBarWrap">
    <div id="progressBar"></div>
  </div>

</div>

<script>
  let activeField = "printId";
  let isLocked = false;
  let countdownTimer = null;

  const printInput   = document.getElementById("printId");
  const otpInput     = document.getElementById("otp");
  const keypadEl     = document.getElementById("keypad");
  const verifyBtn    = document.getElementById("verifyBtn");
  const resultEl     = document.getElementById("result");
  const progressWrap = document.getElementById("progressBarWrap");
  const progressBar  = document.getElementById("progressBar");

  function setActive(field) {
    if (isLocked) return;
    activeField = field;
    printInput.classList.toggle("active", field === "printId");
    otpInput.classList.toggle("active",   field === "otp");
  }

  setActive("printId");

  printInput.addEventListener("click", () => setActive("printId"));
  otpInput.addEventListener("click",   () => setActive("otp"));

  function addNumber(num) {
    if (isLocked) return;
    const input = activeField === "printId" ? printInput : otpInput;
    if ((activeField === "printId" && input.value.length < 6) ||
        (activeField === "otp"     && input.value.length < 4)) {
      input.value += num;
    }
    if (activeField === "printId" && printInput.value.length === 6) setActive("otp");
  }

  function clearInput() {
    if (isLocked) return;
    const input = activeField === "printId" ? printInput : otpInput;
    input.value = "";
  }

  function backspace() {
    if (isLocked) return;
    const input = activeField === "printId" ? printInput : otpInput;
    input.value = input.value.slice(0, -1);
  }

  function lockUI() {
    isLocked = true;
    keypadEl.querySelectorAll("button").forEach(b => b.classList.add("locked"));
    verifyBtn.classList.add("locked");
    printInput.classList.add("locked");
    otpInput.classList.add("locked");
    printInput.classList.remove("active");
    otpInput.classList.remove("active");
  }

  function unlockUI() {
    isLocked = false;
    keypadEl.querySelectorAll("button").forEach(b => b.classList.remove("locked"));
    verifyBtn.classList.remove("locked");
    printInput.classList.remove("locked");
    otpInput.classList.remove("locked");
    printInput.value = "";
    otpInput.value   = "";
    resultEl.innerText = "";
    progressWrap.style.display = "none";
    progressBar.style.width = "0%";
    setActive("printId");
  }

  function startCountdown(seconds) {
    let remaining = seconds;

    function tick() {
      const mm = String(Math.floor(remaining / 60)).padStart(2, "0");
      const ss = String(remaining % 60).padStart(2, "0");
      resultEl.style.color = "#f59e0b";
      resultEl.innerText = `⏳  Next print in ${mm}:${ss}`;

      if (remaining <= 0) {
        clearInterval(countdownTimer);
        countdownTimer = null;
        unlockUI();
        return;
      }
      remaining--;
    }

    tick();
    countdownTimer = setInterval(tick, 1000);
  }

  function verify() {
    if (isLocked) return;

    const id  = printInput.value;
    const otp = otpInput.value;

    if (!id || !otp) {
      resultEl.style.color = "#ef4444";
      resultEl.innerText = "❌  Enter Print ID and OTP";
      return;
    }

    resultEl.style.color = "#94a3b8";
    resultEl.innerText = "⏳  Verifying...";

    fetch("https://printflash-backend.onrender.com/verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ printId: id, otp: otp }),
    })
      .then((r) => r.json())
      .then((data) => {
        if (data.verified) {
          resultEl.style.color = "#22c55e";
          resultEl.innerText = "✅  Verified. Downloading...";

          const printType = data.print_type || "single";

          fetch(`https://printflash-backend.onrender.com/download/${id}`)
            .then((r) => {
              const contentLength = r.headers.get("Content-Length");
              const total = contentLength ? parseInt(contentLength, 10) : null;
              let loaded = 0;
              const reader = r.body.getReader();
              const chunks = [];

              function pump() {
                return reader.read().then(({ done, value }) => {
                  if (done) {
                    progressWrap.style.display = "none";
                    progressBar.style.width = "0%";

                    resultEl.style.color = "#2563eb";
                    resultEl.innerText = "🖨️  Printing...";

                    const blob = new Blob(chunks);
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `print_${printType}.pdf`;
                    link.click();

                    setTimeout(() => {
                      lockUI();
                      setTimeout(() => startCountdown(120), 1500);
                    }, 2000);

                    return;
                  }

                  chunks.push(value);
                  loaded += value.length;

                  if (total) {
                    const pct = Math.min(Math.round((loaded / total) * 100), 100);
                    resultEl.style.color = "#22c55e";
                    resultEl.innerText = `⬇️  Downloading... ${pct}%`;
                    progressWrap.style.display = "block";
                    progressBar.style.width = pct + "%";
                  } else {
                    const kb = Math.round(loaded / 1024);
                    resultEl.style.color = "#22c55e";
                    resultEl.innerText = `⬇️  Downloading... ${kb} KB`;
                    progressWrap.style.display = "block";
                  }

                  return pump();
                });
              }

              return pump();
            })
            .catch(() => {
              resultEl.style.color = "#ef4444";
              resultEl.innerText = "❌  Download failed";
            });

        } else {
          resultEl.style.color = "#ef4444";
          resultEl.innerText   = "❌  Wrong ID or OTP";
          printInput.value = "";
          otpInput.value   = "";
          setActive("printId");
        }
      })
      .catch(() => {
        resultEl.style.color = "#ef4444";
        resultEl.innerText   = "❌  Server error";
      });
  }
</script>
</body>
</html>
